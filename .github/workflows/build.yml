name: Build MangaTalkReader APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MangaTalkReader-debug
        path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Build Signed Release APK
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Signed Release APK
      run: ./gradlew assembleRelease --no-daemon
      env:
        KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MangaTalkReader-release
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0-${{ github.run_number }}
        name: MangaTalkReader v1.0.0 (Build ${{ github.run_number }})
        body: |
          ## Auto-build v1.0.0 (Build ${{ github.run_number }})
          
          ### Features:
          - 📚 Library with Room database
          - 🔍 Search manga via MangaDex API
          - 📖 Reader with OCR (offline) + TTS (offline)
          - 🌐 Multiple source support
          - 🇷🇺 Full Russian language support
          - ⚙️ Real settings (OCR language, TTS speed/pitch)
          
          ### Installation:
          1. Download the APK
          2. Install on Android (enable "Install unknown apps")
          3. Updates install over previous version (same signature)
        files: app/build/outputs/apk/release/app-release.apk
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: false
        prerelease: false
